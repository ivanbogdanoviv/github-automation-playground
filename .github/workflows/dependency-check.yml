name: Dependency Security Check

on:
  schedule:
    - cron: "0 8 * * 1"
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  audit:
    name: pip-audit vulnerability scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies and pip-audit
        run: |
          pip install pip-audit
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run pip-audit against installed environment
        id: audit
        run: |
          echo "## Dependency Security Audit" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          set +e
          pip-audit --format=columns 2>&1 | tee audit-report.txt
          AUDIT_EXIT=$?
          set -e

          echo "### Audit Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat audit-report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          CRITICAL=$(grep -ic "critical" audit-report.txt 2>/dev/null || echo "0")
          echo "audit_exit=$AUDIT_EXIT" >> $GITHUB_OUTPUT
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report-${{ github.run_id }}
          path: audit-report.txt
          retention-days: 30

      - name: Fail only if critical vulnerabilities found
        if: steps.audit.outputs.critical != '0'
        run: |
          echo "::error::Critical vulnerabilities detected."
          exit 1

      - name: All clear
        if: steps.audit.outputs.critical == '0'
        run: echo "No critical vulnerabilities found."
